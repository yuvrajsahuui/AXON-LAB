/* ── container width hook ───────────────────────────────────────────────── */
function useWidth(ref) {
  const [w, setW] = useState(800);
  useEffect(() => {
    if (!ref || !ref.current) return;
    const ro = new ResizeObserver(([e]) => setW(e.contentRect.width));
    ro.observe(ref.current);
    setW(ref.current.getBoundingClientRect().width);
    return () => ro.disconnect();
  }, []);
  return w;
}

                    <Tooltip {...TT}/>
                    <Area type="monotone" dataKey="visits"  stroke="#3b82f6" strokeWidth={2} fill="url(#vg)"/>
                    <Area type="monotone" dataKey="signups" stroke="#06b6d4" strokeWidth={2} fill="url(#sg)"/>
                  </AreaChart>
                </ResponsiveContainer>
              </div>
              <div style={{ display:'grid',gridTemplateColumns:w>500?'3fr 2fr':'1fr',gap:13 }}>
                <div style={{ background:'#111827',border:'1.5px solid #1e293b',borderRadius:16,padding:'17px 18px' }}>
                  <h3 style={{ ...SF,fontSize:'.9rem',fontWeight:700,color:'#f8fafc',marginBottom:13 }}>Product Rankings</h3>
                  <div style={{ display:'flex',flexDirection:'column',gap:12 }}>
                    {[...PRODUCTS].sort((a,b)=>b.demand-a.demand).map(p=>(
                      <div key={p.id} style={{ display:'flex',alignItems:'center',gap:10 }}>
                        <div style={{ width:32,height:32,borderRadius:9,background:`linear-gradient(135deg,${p.g[0]},${p.g[1]})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0 }}>{p.emoji}</div>
                        <div style={{ flex:1 }}>
                          <div style={{ display:'flex',justifyContent:'space-between',marginBottom:4 }}>
                            <span style={{ ...DF,fontSize:'.78rem',fontWeight:500,color:'#e2e8f0' }}>{p.name}</span>
                            <span style={{ ...SF,fontSize:'.78rem',fontWeight:700,color:'#f8fafc' }}>{p.demand}%</span>
                          </div>
                          <div style={{ height:4,background:'#1e293b',borderRadius:99,overflow:'hidden' }}>
                            <div style={{ height:'100%',width:`${p.demand}%`,background:`linear-gradient(90deg,${p.g[0]},${p.g[1]})`,borderRadius:99 }} />
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
                <div style={{ background:'#111827',border:'1.5px solid #1e293b',borderRadius:16,padding:'17px 18px',display:'flex',flexDirection:'column' }}>
                  <h3 style={{ ...SF,fontSize:'.9rem',fontWeight:700,color:'#f8fafc',marginBottom:13 }}>Idea Pipeline</h3>
                  {ideas.length===0
                    ? <div style={{ flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:6,opacity:.4 }}><Lightbulb size={24} color="#475569"/><p style={{ ...DF,fontSize:'.75rem',color:'#475569',margin:0 }}>No ideas yet</p></div>
                    : <div style={{ display:'flex',flexDirection:'column',gap:8 }}>
                        {catData.map(c=>(<div key={c.name}>
                          <div style={{ display:'flex',justifyContent:'space-between',marginBottom:3 }}><span style={{ ...DF,fontSize:'.7rem',color:'#64748b' }}>{c.name}</span><span style={{ ...SF,fontSize:'.7rem',fontWeight:700,color:'#f8fafc' }}>{c.count}</span></div>
                          <div style={{ height:4,background:'#1e293b',borderRadius:99,overflow:'hidden' }}><div style={{ height:'100%',width:`${(c.count/ideas.length)*100}%`,background:c.fill,borderRadius:99 }} /></div>
                        </div>))}
                        <p style={{ ...DF,fontSize:'.68rem',color:'#334155',marginTop:4,marginBottom:0 }}>{ideas.length} total idea{ideas.length!==1?'s':''}</p>
                      </div>
                  }
                </div>
              </div>
            </div>
          )}

          {tab==='products' && (
            <div className="asd" style={{ display:'flex',flexDirection:'column',gap:13 }}>
              <h2 style={{ ...SF,fontSize:'1.35rem',fontWeight:800,color:'#f8fafc',marginBottom:2 }}>Product Performance</h2>
              {PRODUCTS.map(p=>(
                <div key={p.id} style={{ background:'#111827',border:'1.5px solid #1e293b',borderRadius:16,padding:'17px 18px' }}>
                  <div style={{ display:'flex',alignItems:'center',gap:11,marginBottom:11 }}>
                    <div style={{ width:40,height:40,borderRadius:12,background:`linear-gradient(135deg,${p.g[0]},${p.g[1]})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:19,flexShrink:0 }}>{p.emoji}</div>
                    <div>
                      <div style={{ display:'flex',alignItems:'center',gap:7,flexWrap:'wrap' }}>
                        <h3 style={{ ...SF,fontSize:'.92rem',fontWeight:700,color:'#f8fafc',margin:0 }}>{p.name}</h3>
                        <span style={{ ...DF,fontSize:9,fontWeight:600,background:'#eff6ff',color:'#2563eb',padding:'2px 7px',borderRadius:99 }}>{p.status}</span>
                        <span style={{ ...DF,fontSize:'.7rem',fontWeight:700,color:'#34d399' }}>{p.trend}</span>
                      </div>
                    </div>
                  </div>
                  <div style={{ display:'grid',gridTemplateColumns:w>400?'repeat(4,1fr)':'repeat(2,1fr)',gap:9,marginBottom:10 }}>
                    {[['Views',p.views.toLocaleString(),'#3b82f6'],['Waitlist',p.waitlist.toLocaleString(),'#06b6d4'],['Conv.',`${p.conv}%`,'#10b981'],['Demand',`${p.demand}%`,'#f59e0b']].map(([l,v,c])=>(
                      <div key={l} style={{ background:'#0f172a',borderRadius:9,padding:'9px 11px' }}>
                        <p style={{ ...DF,fontSize:'.65rem',color:'#475569',margin:'0 0 2px' }}>{l}</p>
                        <p style={{ ...SF,fontSize:'1rem',fontWeight:800,color:c,margin:0 }}>{v}</p>
                      </div>
                    ))}
                  </div>
                  <div style={{ height:5,background:'#1e293b',borderRadius:99,overflow:'hidden' }}>
                    <div style={{ height:'100%',width:`${p.demand}%`,background:`linear-gradient(90deg,${p.g[0]},${p.g[1]})`,borderRadius:99 }} />
                  </div>
                </div>
              ))}
              <div style={{ background:'#111827',border:'1.5px solid #1e293b',borderRadius:16,padding:'17px 18px' }}>
                <h3 style={{ ...SF,fontSize:'.9rem',fontWeight:700,color:'#f8fafc',marginBottom:14 }}>Waitlist vs Views</h3>
                <ResponsiveContainer width="100%" height={180}>
                  <BarChart data={PRODUCTS.map(p=>({ name:p.name.split(' ').slice(0,2).join(' '),waitlist:p.waitlist,views:p.views }))}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#1e293b"/>
                    <XAxis dataKey="name" stroke="#334155" tick={{fontSize:10,fill:'#475569'}}/>
                    <YAxis stroke="#334155" tick={{fontSize:10,fill:'#475569'}}/>
                    <Tooltip {...TT}/>
                    <Bar dataKey="views"    fill="#3b82f6" radius={[4,4,0,0]} opacity={.75}/>
                    <Bar dataKey="waitlist" fill="#06b6d4" radius={[4,4,0,0]}/>
                  </BarChart>
                </ResponsiveContainer>
              </div>
            </div>
          )}

          {tab==='ideas' && (
            <div className="asd" style={{ display:'flex',flexDirection:'column',gap:13 }}>
              <div style={{ display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:9 }}>
                <div>
                  <h2 style={{ ...SF,fontSize:'1.35rem',fontWeight:800,color:'#f8fafc',marginBottom:2 }}>Submitted Ideas</h2>
                  <p style={{ ...DF,fontSize:'.73rem',color:'#475569',margin:0 }}>{ideas.length} idea{ideas.length!==1?'s':''} from the community</p>
                </div>
                <div style={{ display:'flex',flexWrap:'wrap',gap:5 }}>
                  {CATS.map(c=>(
                    <button key={c} onClick={()=>setCatF(c)} style={{ ...DF,fontSize:'.68rem',fontWeight:600,padding:'4px 9px',borderRadius:7,cursor:'pointer',border:catF===c?'none':'1.5px solid #1e293b',background:catF===c?'#2563eb':'#1e293b',color:catF===c?'#fff':'#64748b',transition:'all .17s' }}>{c}</button>
                  ))}
                </div>
              </div>
              {filtered.length===0
                ? <div style={{ background:'#111827',border:'1.5px solid #1e293b',borderRadius:16,padding:48,textAlign:'center' }}>
                    <Lightbulb size={30} color="#1e293b" style={{ margin:'0 auto 8px' }}/>
                    <p style={{ ...SF,color:'#334155',fontWeight:600,margin:'0 0 3px' }}>No ideas yet</p>
                    <p style={{ ...DF,fontSize:'.76rem',color:'#1e293b',margin:0 }}>Ideas submitted via the public form appear here.</p>
                  </div>
                : <div style={{ display:'grid',gridTemplateColumns:w>500?'repeat(2,1fr)':'1fr',gap:11 }}>
                    {filtered.map(idea=>(
                      <div key={idea.id} style={{ background:'#111827',border:'1.5px solid #1e293b',borderRadius:16,padding:'15px 16px',display:'flex',flexDirection:'column',gap:9 }}>
                        <div style={{ display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:7 }}>
                          <div>
                            <h3 style={{ ...SF,fontSize:'.88rem',fontWeight:700,color:'#f8fafc',margin:'0 0 2px',lineHeight:1.3 }}>{idea.title}</h3>
                            <p style={{ ...DF,fontSize:'.68rem',color:'#475569',margin:0 }}>{idea.name||'Anonymous'} · {idea.submittedAt}</p>
                          </div>
                          <span style={{ display:'inline-flex',alignItems:'center',padding:'2px 7px',borderRadius:99,fontSize:9,fontWeight:700,flexShrink:0,background:`${CAT_CLR[idea.category]}20`,color:CAT_CLR[idea.category],fontFamily:'DM Sans,sans-serif' }}>{idea.category}</span>
                        </div>
                        {[['Problem',idea.problem],idea.solution&&['Solution',idea.solution]].filter(Boolean).map(([l,t])=>(
                          <div key={l} style={{ background:'#0f172a',borderRadius:9,padding:'8px 10px' }}>
                            <p style={{ ...DF,fontSize:'.64rem',fontWeight:700,color:'#334155',textTransform:'uppercase',letterSpacing:'.08em',margin:'0 0 2px' }}>{l}</p>
                            <p style={{ ...DF,fontSize:'.78rem',color:'#94a3b8',margin:0,lineHeight:1.5 }}>{t}</p>
                          </div>
                        ))}
                        <div style={{ display:'flex',justifyContent:'space-between',alignItems:'center' }}>
                          <p style={{ ...DF,fontSize:'.68rem',color:'#334155',margin:0 }}>{idea.email}</p>
                          <button style={{ display:'flex',alignItems:'center',gap:4,background:'rgba(16,185,129,.1)',border:'1.5px solid rgba(16,185,129,.2)',color:'#34d399',borderRadius:7,padding:'4px 9px',fontSize:'.68rem',fontWeight:700,cursor:'pointer',fontFamily:'DM Sans,sans-serif' }}>
                            <TrendingUp size={10}/> Validate
                          </button>
                        </div>
                      </div>
                    ))}
                  </div>
              }
            </div>
          )}

          {tab==='traffic' && (
            <div className="asd" style={{ display:'flex',flexDirection:'column',gap:13 }}>
              <h2 style={{ ...SF,fontSize:'1.35rem',fontWeight:800,color:'#f8fafc',marginBottom:2 }}>Traffic Analytics</h2>
              <div style={{ background:'#111827',border:'1.5px solid #1e293b',borderRadius:16,padding:'17px 18px' }}>
                <h3 style={{ ...SF,fontSize:'.9rem',fontWeight:700,color:'#f8fafc',marginBottom:14 }}>Daily Visitors & Signups</h3>
                <ResponsiveContainer width="100%" height={230}>
                  <LineChart data={TRAFFIC}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#1e293b"/>
                    <XAxis dataKey="date" stroke="#334155" tick={{fontSize:10,fill:'#475569'}}/>
                    <YAxis stroke="#334155" tick={{fontSize:10,fill:'#475569'}}/>
                    <Tooltip {...TT}/><Legend/>
                    <Line type="monotone" dataKey="visits"  stroke="#3b82f6" strokeWidth={2.5} dot={{fill:'#3b82f6',r:3}}/>
                    <Line type="monotone" dataKey="signups" stroke="#06b6d4" strokeWidth={2.5} dot={{fill:'#06b6d4',r:3}}/>
                    <Line type="monotone" dataKey="ready"   stroke="#a78bfa" strokeWidth={2.5} dot={{fill:'#a78bfa',r:3}}/>
                  </LineChart>
                </ResponsiveContainer>
              </div>
              <div style={{ background:'#111827',border:'1.5px solid #1e293b',borderRadius:16,overflow:'hidden' }}>
                <div style={{ padding:'14px 18px',borderBottom:'1.5px solid #1e293b' }}>
                  <h3 style={{ ...SF,fontSize:'.9rem',fontWeight:700,color:'#f8fafc',margin:0 }}>Daily Breakdown</h3>
                </div>
                {[...TRAFFIC].reverse().map((row,i)=>(
                  <div key={i} style={{ display:'flex',alignItems:'center',padding:'11px 18px',borderBottom:i<TRAFFIC.length-1?'1px solid #0f172a':'none' }}>
                    <span style={{ ...DF,fontSize:'.75rem',color:'#475569',width:58,flexShrink:0 }}>{row.date}</span>
                    <div style={{ flex:1,display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8 }}>
                      {[['Visits',row.visits,'#3b82f6'],['Signups',row.signups,'#06b6d4'],['Ready',row.ready,'#a78bfa']].map(([l,v,c])=>(
                        <div key={l}>
                          <p style={{ ...DF,fontSize:'.64rem',color:'#334155',margin:'0 0 1px' }}>{l}</p>
                          <p style={{ ...SF,fontSize:'.9rem',fontWeight:700,color:c,margin:0 }}>{v}</p>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </main>
      </div>
    </div>
  );
}

/* ── footer ─────────────────────────────────────────────────────────────── */
function Footer({ onSuggestIdea, onAdminOpen }) {
  const root = useRef(null);
  const w    = useWidth(root);
  const cols = w>560?'2fr 1fr 1fr 1fr':w>340?'1fr 1fr':'1fr';
  return (
    <footer ref={root} style={{ background:'#0a0f1e',borderTop:'1.5px solid #1e293b',padding:'48px 16px 28px' }}>
      <div style={{ maxWidth:1200,margin:'0 auto' }}>
        <div style={{ display:'grid',gridTemplateColumns:cols,gap:28,marginBottom:40 }}>
          <div>
            <div style={{ display:'flex',alignItems:'center',gap:8,marginBottom:10 }}>
              <div style={{ width:27,height:27,borderRadius:8,background:'linear-gradient(135deg,#2563eb,#0ea5e9)',display:'flex',alignItems:'center',justifyContent:'center' }}>
                <Zap size={13} color="#fff"/>
              </div>
              <span style={{ ...SF,fontWeight:700,color:'#f8fafc',fontSize:'.95rem' }}>Demand Lab</span>
            </div>
            <p style={{ ...DF,fontSize:'.82rem',color:'#475569',lineHeight:1.65,maxWidth:200,margin:'0 0 13px' }}>Test demand, build waitlists, launch with confidence.</p>
            <button className="bv" style={{ padding:'7px 13px',fontSize:'.76rem' }} onClick={onSuggestIdea}>
              <Lightbulb size={12}/> Suggest an Idea
            </button>
          </div>
          {[['Product',['Features','Pricing','API','Docs']],['Company',['About','Blog','Contact']],['Legal',['Privacy','Terms']]].map(([title,links])=>(
            <div key={title}>
              <h4 style={{ ...SF,fontSize:'.73rem',fontWeight:700,color:'#64748b',marginBottom:13,textTransform:'uppercase',letterSpacing:'.07em' }}>{title}</h4>
              <ul style={{ listStyle:'none',padding:0,margin:0,display:'flex',flexDirection:'column',gap:8 }}>
                {links.map(l=>(<li key={l}><a href="#" style={{ ...DF,fontSize:'.82rem',color:'#475569',textDecoration:'none' }}>{l}</a></li>))}
              </ul>
            </div>
          ))}
        </div>
        <div style={{ borderTop:'1.5px solid #1e293b',paddingTop:20,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:9 }}>
          <p style={{ ...DF,fontSize:'.75rem',color:'#334155',margin:0 }}>© 2026 Demand Lab. All rights reserved.</p>
          <button onClick={onAdminOpen} style={{ display:'flex',alignItems:'center',gap:5,background:'rgba(255,255,255,.04)',border:'1px solid #1e293b',borderRadius:7,padding:'5px 10px',cursor:'pointer',color:'#334155',fontSize:'.7rem',fontFamily:'DM Sans,sans-serif',fontWeight:500 }}
            onMouseEnter={e=>{e.currentTarget.style.color='#64748b';e.currentTarget.style.borderColor='#334155';}}
            onMouseLeave={e=>{e.currentTarget.style.color='#334155';e.currentTarget.style.borderColor='#1e293b';}}>
            <Lock size={10}/> Admin
          </button>
        </div>
      </div>
    </footer>
  );
}

/* ── app ────────────────────────────────────────────────────────────────── */
function DemandLab() {
  const [view,setView]             = useState('home');
  const [selProduct,setSelProduct] = useState(null);
  const [showIdea,setShowIdea]     = useState(false);
  const [ideas,setIdeas]           = useState([]);
  const openAdmin = () => setView('adminLogin');

  if (view==='admin')      return <AdminDashboard onLogout={()=>setView('home')} ideas={ideas} />;
  if (view==='adminLogin') return <AdminLogin onLogin={()=>setView('admin')} onBack={()=>setView('home')} />;

  return (
    <div style={{ background:'#fff' }}>
      <Header onSuggestIdea={()=>setShowIdea(true)} />
      <HeroSection onSuggestIdea={()=>setShowIdea(true)} />
      <ProductsSection onSelectProduct={setSelProduct} />
      <WhySection />
      <Footer onSuggestIdea={()=>setShowIdea(true)} onAdminOpen={openAdmin} />
      {selProduct && <ProductModal p={selProduct} onClose={()=>setSelProduct(null)} />}
      {showIdea   && <SuggestIdeaModal onClose={()=>setShowIdea(false)} onSubmit={idea=>setIdeas(prev=>[idea,...prev])} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<DemandLab />);
</script>
</body>
</html>
